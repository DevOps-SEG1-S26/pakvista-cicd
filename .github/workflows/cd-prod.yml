name: CD - Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Render (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Production Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}"

      - name: Confirm deployment trigger
        run: echo "Deployment to production triggered at $(date)"
